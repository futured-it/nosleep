name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on macOS
    runs-on: macos-latest   # uses the latest macOS runner with Xcode and Swift

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Swift Version
        id: read_version
        run: |
          VERSION=$(cat .swift-version | tr -d '[:space:]')
          echo "SWIFT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Show Swift version
        run: swift --version

      - name: Clean any previous builds
        run: swift package clean

      - name: Run tests
        run: swift test --enable-code-coverage   # optional, enables coverage report